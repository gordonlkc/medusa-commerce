[supervisord]
nodaemon=true
logfile=/dev/null
pidfile=/var/run/supervisord.pid
childlogdir=/var/log/supervisor
logfile_maxbytes=0
logfile_backups=0

[program:medusa]
command=/app/backend/start.sh
directory=/app/backend
autostart=true
autorestart=true
startsecs=30
startretries=3
stopwaitsecs=30
stopsignal=TERM
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile_maxbytes=0
redirect_stderr=true
environment=NODE_ENV="production",PORT="9000"
priority=10

[program:nextjs]
command=node server.js
directory=/app/storefront
autostart=true
autorestart=true
startsecs=5
startretries=10
stopwaitsecs=30
stopsignal=TERM
stdout_logfile=/var/log/supervisor/nextjs.out.log
stderr_logfile=/var/log/supervisor/nextjs.err.log
stdout_logfile_maxbytes=10MB
stderr_logfile_maxbytes=10MB
environment=NODE_ENV="production",PORT="8000",HOSTNAME="0.0.0.0"
priority=20

[program:nginx]
command=nginx -g "daemon off;"
autostart=true
autorestart=true
startsecs=2
startretries=5
stopwaitsecs=10
stopsignal=QUIT
stdout_logfile=/var/log/supervisor/nginx.out.log
stderr_logfile=/var/log/supervisor/nginx.err.log
stdout_logfile_maxbytes=5MB
stderr_logfile_maxbytes=5MB
priority=30

[program:debug]
command=node /app/backend/debug-server.js
directory=/app/backend
autostart=true
autorestart=true
startsecs=2
startretries=3
stopwaitsecs=5
stopsignal=TERM
stdout_logfile=/var/log/supervisor/debug.out.log
stderr_logfile=/var/log/supervisor/debug.err.log
stdout_logfile_maxbytes=1MB
stderr_logfile_maxbytes=1MB
priority=50
