worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /run/nginx/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50m;

    upstream medusa {
        server 127.0.0.1:9000;
    }

    upstream nextjs {
        server 127.0.0.1:8000;
    }

    server {
        listen 8080;
        server_name _;

        # Medusa Store API
        location /store/ {
            proxy_pass http://medusa;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_read_timeout 60s;
        }

        # Medusa Admin API
        location /admin/ {
            proxy_pass http://medusa;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_read_timeout 60s;
        }

        # Auth endpoints
        location /auth/ {
            proxy_pass http://medusa;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_read_timeout 60s;
        }

        # Health check — static OK for startup, real check for liveness
        location = /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        # Direct medusa health check
        location = /medusa-health {
            proxy_pass http://127.0.0.1:9000/health;
            proxy_connect_timeout 2s;
            proxy_read_timeout 2s;
            error_page 502 504 = @fallback;
        }

        location @fallback {
            return 503 'Medusa not ready';
            add_header Content-Type text/plain;
        }

        # Debug: DB connectivity diagnostics
        location = /debug-db {
            proxy_pass http://127.0.0.1:9001/db-status;
            proxy_connect_timeout 3s;
            proxy_read_timeout 10s;
            default_type application/json;
        }

        # Debug: Store setup
        location = /setup-store {
            proxy_pass http://127.0.0.1:9001/setup-store;
            proxy_connect_timeout 3s;
            proxy_read_timeout 30s;
            proxy_method POST;
            default_type application/json;
        }

        # Stripe webhooks
        location /hooks/ {
            proxy_pass http://medusa;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_read_timeout 120s;
        }

        # Next.js Storefront (default)
        location / {
            proxy_pass http://nextjs;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_read_timeout 60s;
        }

        # Next.js static assets
        location /_next/static/ {
            proxy_pass http://nextjs;
            proxy_set_header Host $host;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        location /assets/ {
            proxy_pass http://nextjs;
            expires 7d;
            add_header Cache-Control "public";
        }

        location ~* \.(ico|png|jpg|jpeg|gif|svg|webp|woff|woff2|ttf|eot)$ {
            proxy_pass http://nextjs;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }
}
